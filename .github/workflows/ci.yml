name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build & test (Kotlin + bundled runtime + client suite)
        run: ./gradlew build --no-daemon

      - name: Build the Gradle plugin
        run: ./gradlew :gradle-plugin:build --no-daemon
